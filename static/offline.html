<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Pokemon PvP Offline</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            color: #e2e8f0;
            background: #020617;
            font-family: Arial, sans-serif;
        }
        main {
            width: min(440px, calc(100% - 2rem));
            padding: 1.25rem;
            border: 1px solid #334155;
            border-radius: .75rem;
            background: #0f172a;
        }
        h1 { margin: 0 0 .5rem; color: #facc15; font-size: 1.45rem; }
        p { margin: 0; color: #cbd5e1; line-height: 1.5; }
    </style>
</head>
<body>
<main>
    <h1>Offline mode</h1>
    <p>The app shell is cached. Reconnect to start new API-backed battles or load Pokemon that have not been opened before.</p>
</main>
</body>
</html>
